<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Calculadora y Cuadro de Elección FMV</title>
    
    <!-- Librería externa para exportar la imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Enlace al archivo de estilos CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Probabilidad FMV 2026</h1>
        <p>Cálculo basado en entrevistas y uso del valenciano</p>
    </header>

    <div class="controles-container">
        <input type="text" id="buscador" placeholder="Buscar candidata o falla..." oninput="renderizarTarjetas()">
        <select id="filtro-sector" onchange="renderizarTarjetas()">
            <option value="todos">Todos los sectores</option>
        </select>
        
        <button id="btn-eleccion" onclick="toggleModoEleccion()">Activar Modo Elección</button>
        <button id="btn-reiniciar" onclick="reiniciarEleccion()" style="display: none; background-color: #555; color: white; border-color: #333;">Reiniciar Elección</button>
    </div>

    <div id="zona-eleccion">
        <h2 style="color: var(--granate);">Corte de Honor (Seleccionadas: <span id="contador-corte">0</span>/13)</h2>
        <div id="corte-grid" class="corte-grid">
            <!-- Las miniaturas se inyectan por JS -->
        </div>
        
        <div class="fmv-spot">
            <h2 style="color: var(--dorado);">Fallera Mayor de Valencia</h2>
            <div id="fmv-elegida">
                <p style="color: #666;">Haz clic en una candidata de la Corte para elegirla FMV</p>
            </div>
        </div>

        <div id="botones-exportacion" style="display: none; margin-top: 30px; gap: 15px; justify-content: center;">
            <button onclick="compartirWhatsApp()" style="background-color: #25D366; color: white; border: none;">📲 Compartir por WhatsApp</button>
            <button onclick="descargarImagen()" style="background-color: var(--dorado); color: var(--granate); border: none;">📸 Descargar Quiniela</button>
        </div>
    </div>

    <div id="grid-candidatas">
        <!-- Las tarjetas principales se inyectan por JS -->
    </div>

    <!-- Enlace al archivo de lógica JavaScript (siempre al final del body) -->
    <script src="script.js"></script>
</body>
</html>
